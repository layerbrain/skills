name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Smoke test
        run: |
          node dist/cli.js skills
          node dist/cli.js agents
          SANDBOX=$(mktemp -d)
          node dist/cli.js install --agent claude-code --dir "$SANDBOX"
          test -f "$SANDBOX/.claude/skills/machines/SKILL.md"
          node dist/cli.js install --agent agents-md --dir "$SANDBOX"
          test -f "$SANDBOX/AGENTS.md"
